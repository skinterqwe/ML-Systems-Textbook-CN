name: Deploy Quarto Website to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install TeX Live and Inkscape
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-extra texlive-latex-recommended \
            texlive-fonts-recommended texlive-pictures texlive-luatex \
            lmodern inkscape

      - name: Verify TikZ tools
        run: |
          echo "=== LuaLaTeX version ==="
          lualatex --version | head -5
          echo ""
          echo "=== Inkscape version ==="
          inkscape --version
          echo ""
          echo "=== Quarto version ==="
          quarto --version
          echo ""
          echo "=== Check diagram.lua extension ==="
          ls -la output/book/_extensions/pandoc-ext/diagram/ 2>/dev/null || echo "diagram extension not found"

      - name: Render website
        working-directory: output/book
        run: quarto render --no-execute 2>&1 | tee ../render.log

      - name: Check TikZ SVG output
        if: always()
        run: |
          echo "=== SVG files in build output ==="
          find output/book/_build/html -name "*.svg" 2>/dev/null | head -20 || echo "No SVG files found"
          echo ""
          echo "=== TikZ code blocks in rendered HTML ==="
          grep -rl '{\.tikz}' output/book/_build/html/ 2>/dev/null | head -10 || echo "No .tikz references found"
          echo ""
          echo "=== Render log (last 50 lines) ==="
          tail -50 output/render.log 2>/dev/null || echo "No render log found"

      - name: Create root index.html redirect
        run: |
          cat > output/book/_build/html/index.html << 'EOF'
          <!DOCTYPE html>
          <html><head><meta http-equiv="refresh" content="0; url=contents/frontmatter/index.html"></head><body></body></html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/book/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
